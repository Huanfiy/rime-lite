# Rime schema
# encoding: utf-8
#
# rime-lite 主方案：最小全拼
# 依据 docs/design/architecture.md §4.2，参考 rime-ice 工程 rime_ice.schema.yaml 裁剪（2026-07-02）。
# 相对 rime-ice 的取舍：
#   - 热路径 Lua 仅 AI 候选通路（D-18，预算制红线 D-19）；零 OpenCC filter（无 Emoji、无简繁切换、无置顶 / 降频）
#   - speller 保留超级简拼与 v/ü 转换，不引入模糊音与自动纠错
#   - translators 仅保留：标点、拼音、custom_phrase、melt_eng

schema:
  schema_id: pinyin
  name: 拼音
  version: "2026-07-08"
  author:
    - huan
  description: |
    rime-lite 最小全拼方案
    工程源: /home/huan/sync/rime-lite
  dependencies:
    - melt_eng        # 英文输入，作为次翻译器挂载


# 开关
switches:
  - name: ascii_mode
    states: [ 中, Ａ ]
  - name: ascii_punct  # 中英标点
    states: [ ¥, $ ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ai_suggest   # AI 候选自动预取（D-18）；关闭时触发键仍可显式请求
    states: [ AI关, AI开 ]
    reset: 1


# 输入引擎
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - lua_processor@*ai.trigger      # AI 候补触发键（D-18，默认 Control+t）
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher            # 响应 recognizer 的 patterns（email、url 等）
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator                # 主翻译器：全拼
    - table_translator@custom_phrase   # 个人固定短语 custom_phrase.txt
    - table_translator@melt_eng        # 英文词库
  filters:
    - lua_filter@*ai.suggest           # AI 智能候补注入（D-18，非阻塞，daemon 缺席自动降级）
    - uniquifier         # 候选去重（AI 候补与本地候选重文时消重）


# 拼写设定
speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
  algebra:
    ### 超级简拼
    - erase/^hm$/ # 取消「噷 hm」对简拼编码的独占（custom_phrase.txt 提供该词条）
    - erase/^m$/  # 取消「呣 m」的独占
    - erase/^n$/  # 取消「嗯 n」的独占
    - erase/^ng$/ # 取消「嗯 ng」的独占
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/  # zh ch sh 视为整体
    ### v u 转换（词库按 u v(ü) 注音，支持 qv nue 等输入）
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])v/$1u/


# 主翻译器，拼音
translator:
  dictionary: pinyin
  enable_user_dict: true   # 本机学习缓存（userdb），不进 Git，见 architecture.md §7
  initial_quality: 1.2     # 拼音权重高于 melt_eng
  preedit_format:
    - xform/([jqxy])v/$1u/ # 显示为 ju qu xu yu


# 个人固定短语：custom_phrase.txt
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb        # 只读数据库，不动态调频
  enable_completion: false
  enable_sentence: false
  initial_quality: 99       # 高于拼音与 melt_eng，固定短语排序在前


# 次翻译器，英文
melt_eng:
  dictionary: melt_eng
  enable_sentence: false
  enable_user_dict: false
  initial_quality: 1.1
  comment_format:
    - xform/.*//            # 清空提示码


# AI 候选通路（D-18）；daemon 见 services/candidate-daemon/
ai_suggest:
  min_length: 4          # 自动预取的最小编码长度
  top_k: 8               # 送作参考的本地候选数
  trigger_key: "Tab"     # 组词中按 Tab 调出 AI 候补（Ctrl+t 常被应用吞，2026-07-08 调整）
  trigger_wait_ms: 250   # 触发键对在途结果的有界等待


# 标点符号，从 default.yaml 导入
punctuator:
  import_preset: default


# 特定规则的输入码，从 default.yaml 导入
recognizer:
  import_preset: default


# 快捷键，从 default.yaml 导入
key_binder:
  import_preset: default


# 操作键行为
editor:
  bindings:
    space: confirm                     # 空格键：上屏候选项
    Return: commit_raw_input           # 回车键：上屏原始输入
    Control+Return: commit_script_text # Ctrl+回车：上屏变换后输入
    BackSpace: revert                  # 退格键：向前删除（撤消上次输入）
    Delete: delete                     # Delete 键：向后删除
    Control+BackSpace: back_syllable   # Ctrl+退格：删除一个音节
    Control+Delete: delete_candidate   # Ctrl+Delete：删除或降权候选项
    Escape: cancel                     # Esc 键：取消输入
